<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>WillGrow | Home</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="supreme.css">
</head>
<body>
    <header class="app-header">
        <div>
            <p class="eyebrow">Good morning</p>
            <h1>Today</h1>
        </div>
    </header>

            <div class="hero-card-fitting">
          <section class="hero-card">
            <div>
              <p class="card-label">Runner Beans</p>
              <h2>Moisture looks good</h2>
              <p class="card-text">
                Your probe is reporting healthy soil conditions.
              </p>
            </div>
          </section>
        </div>

    <main class="content">

        <section class="stats-grid">
            <div class="stat-card" id="plant1">
              <p>Moisture</p>
              <strong>--%</strong>
            </div>

            <div class="stat-card">
              <p>Light</p>
              <strong>--</strong>
            </div>

            <div class="stat-card">
              <p>Temp</p>
              <strong>--°C</strong>
            </div>

            <div class="stat-card">
              <p>Battery</p>
              <strong>--%</strong>
            </div>
        </section>


        <section class="section-title-row">
            <h3>Your plants</h3>
            <a class="view-btn" href="/page/plants/plants.html">View all</a>
        </section>

        <section class="plant-list">
        <article class="plant-row">
          <div class="plant-dot"></div>

            <div class="plant-info">
                <h4>Runner Beans</h4>
                <p>Back garden</p>
            </div>

            <span class="status-pill good">Healthy</span>

            </article>

            <article class="plant-row">
              <div class="plant-dot warning"></div>

              <div class="plant-info">
                <h4>Tomatoes</h4>
                <p>Greenhouse</p>
              </div>

              <span class="status-pill warn">Dry soon</span>
            </article>
          </section>

    </main>

    <nav class="bottom-nav">
      <a class="nav-btn active"href="/index.html">Home</a>
      <a class="nav-btn" href="/page/plants/plants.html">Plants</a>
      <a class="nav-btn" href="/page/alerts/alerts.html">Alerts</a>

    </nav>
