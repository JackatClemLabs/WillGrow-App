        <div>
            <p class="eyebrow">Good morning</p>

            </svg>
        </button>
    </header>

    <main class="content">

        <section class="hero-card">
        <div>
          <p class="card-label">Runner Beans</p>
            <h2>Moisture looks good</h2>
            <p class="card-text">
                Your probe is reporting healthy soil conditions.
            </p>
        </div>

        </section>

        <section class="stats-grid">
            <div class="stat-card" id="plant1">
              <p>Moisture</p>
              <strong>72%</strong>
            </div>

            <div class="stat-card">
              <p>Light</p>
              <strong>Good</strong>
            </div>

            <div class="stat-card">
              <p>Temp</p>
              <strong>21°C</strong>
            </div>

            <div class="stat-card">
              <p>Battery</p>
              <strong>86%</strong>
            </div>
        </section>


        <section class="section-title-row">
            <h3>Your plants</h3>
            <a href="/page/plants/plants.html">View all</a>
        </section>

        <section class="plant-list">
        <article class="plant-row">
          <div class="plant-dot"></div>

            <div class="plant-info">
                <h4>Runner Beans</h4>
                <p>Back garden</p>
            </div>

            <span class="status-pill good">Healthy</span>

            </article>

            <article class="plant-row">
              <div class="plant-dot warning"></div>

              <div class="plant-info">
                <h4>Tomatoes</h4>
                <p>Greenhouse</p>
              </div>

              <span class="status-pill warn">Dry soon</span>
            </article>
          </section>

    </main>
